# Локально: docker compose -f docker-compose.dev.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-scheduler}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-scheduler}
      POSTGRES_DB: ${DB_NAME:-scheduler}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${DB_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-scheduler} -d ${DB_NAME:-scheduler}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
